<!DOCTYPE html>
<html lang="{{_lang}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{meta_title}}</title>
  <meta name="description" content="{{meta_title}}">
  <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A1628; background-image: radial-gradient(ellipse 80% 60% at 15% 0%, rgba(0,82,204,0.55) 0%, transparent 60%), radial-gradient(ellipse 70% 50% at 85% 100%, rgba(0,180,220,0.35) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 60% 30%, rgba(0,212,255,0.15) 0%, transparent 55%); background-attachment: fixed; font-family: 'DM Sans', system-ui, sans-serif; min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
  </style>






</head>
<body>
<style>
:root {
  --blue: #0052CC;
  --cyan: #00D4FF;
  --dark: #0A1628;
  --gray: #F5F7FA;
  --text: #1A2340;
  --muted: #6B7280;
  --border: rgba(0,82,204,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
.lrb { font-family: 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; color: #fff; background: transparent; min-height: 100vh;}
.lrb-hero { background: linear-gradient(135deg, #060D1A 0%, #0A1628 30%, #0052CC 70%, #0099DD 100%); padding: 90px 20px 70px; text-align: center; }
.lrb-hero-badge { display: inline-block; padding: 8px 20px; background: rgba(0,212,255,0.15); border: 1px solid rgba(0,212,255,0.35); border-radius: 30px; font-size: 14px; font-weight: 600; color: #00D4FF; margin-bottom: 24px; }
.lrb-hero h1 { font-size: clamp(30px, 4vw, 48px); font-weight: 800; color: #fff; margin-bottom: 14px; letter-spacing: -1.5px; font-family: "Syne", sans-serif; }
.lrb-hero p { font-size: 17px; color: rgba(255,255,255,0.65); max-width: 500px; margin: 0 auto; line-height: 1.7; }
.lrb-body { background: transparent;
  background-image: 
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,82,204,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 90%, rgba(0,180,220,0.20) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 60% 30%, rgba(0,212,255,0.10) 0%, transparent 50%);
  background-image: 
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,82,204,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 90%, rgba(0,180,220,0.20) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 60% 30%, rgba(0,212,255,0.10) 0%, transparent 50%);
  background-image:
    radial-gradient(ellipse 80% 50% at 20% 0%, rgba(0,82,204,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0,180,220,0.10) 0%, transparent 55%),
    radial-gradient(ellipse 40% 60% at 60% 40%, rgba(0,212,255,0.05) 0%, transparent 50%); max-width: 760px; margin: 0 auto; padding: 80px 20px 100px; text-align: center; }
.lrb-soon { font-size: 80px; margin-bottom: 24px; }
.lrb-body h2 { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 14px; letter-spacing: -0.5px; font-family: "Syne", sans-serif; }
.lrb-body p { font-size: 16px; color: rgba(255,255,255,0.55); line-height: 1.75; margin-bottom: 32px; max-width: 480px; margin-left: auto; margin-right: auto; }
.lrb-topics { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 40px; }
.lrb-topic { padding: 8px 16px; background: rgba(0,212,255,0.07); border: 1px solid rgba(0,212,255,0.18); border-radius: 20px; font-size: 13px; font-weight: 600; color: #00D4FF; transition: all .2s; cursor: default; }
.lrb-cta { display: inline-block; padding: 14px 28px; background: linear-gradient(135deg, var(--blue), var(--cyan)); border-radius: 12px; color: #fff; text-decoration: none; font-size: 15px; font-weight: 700; }
</style>

<div class="lrb">
  <section class="lrb-hero">
    <div class="lrb-hero-badge" data-i18n="bl_badge">{{bl_badge}}</div>
    <h1 data-i18n="bl_title">{{bl_title}}</h1>
    <p data-i18n="bl_sub">{{bl_sub}}</p>
  </section>
  <div class="lrb-body">
    <div class="lrb-soon">✍️</div>
    <h2 data-i18n="bl_soon_title">{{bl_soon_title}}</h2>
    <p data-i18n="bl_soon_desc">{{bl_soon_desc}}</p>
    <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:28px;max-width:500px;margin:0 auto 36px;text-align:left;">
      <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;" data-i18n="bl_upcoming">{{bl_upcoming}}</div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div style="display:flex;align-items:center;gap:12px;font-size:14px;color:rgba(255,255,255,0.65);">
          <span style="font-size:16px;">📱</span> <span data-i18n="bl_art1">{{bl_art1}}</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;font-size:14px;color:rgba(255,255,255,0.65);">
          <span style="font-size:16px;">🌍</span> <span data-i18n="bl_art2">{{bl_art2}}</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;font-size:14px;color:rgba(255,255,255,0.65);">
          <span style="font-size:16px;">📅</span> <span data-i18n="bl_art3">{{bl_art3}}</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;font-size:14px;color:rgba(255,255,255,0.65);">
          <span style="font-size:16px;">💡</span> <span data-i18n="bl_art4">{{bl_art4}}</span>
        </div>
      </div>
    </div>
    <div class="lrb-topics">
      <span class="lrb-topic" data-i18n="bl_tag1">{{bl_tag1}}</span>
      <span class="lrb-topic" data-i18n="bl_tag2">{{bl_tag2}}</span>
      <span class="lrb-topic" data-i18n="bl_tag3">{{bl_tag3}}</span>
      <span class="lrb-topic" data-i18n="bl_tag4">{{bl_tag4}}</span>
      <span class="lrb-topic" data-i18n="bl_tag5">{{bl_tag5}}</span>
      <span class="lrb-topic" data-i18n="bl_tag6">{{bl_tag6}}</span>
    </div>
    <a href="/auth" class="lrb-cta" data-i18n="bl_cta">{{bl_cta}}</a>
  </div>
</div>


  <script src="/nav.js"></script>
  <script src="/footer.js"></script>

  <script>
  // Keep the language switcher (nav.js) in sync with this statically-baked page.
  try { localStorage.setItem('lr_lang', '{{_lang}}'); } catch (e) {}
  </script>
</body>
</html>
