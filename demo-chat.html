<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Démo — LocalReply</title>
  <meta name="description" content="LocalReply — Assistant IA 24/7 pour petits commerces">
  <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(145deg, #f0f4fb 0%, #e8f0fb 50%, #f5f7fa 100%); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; min-height: 100vh; overflow-x: hidden; }
  </style>

</head>
<body>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

:root {
  --blue: #0052CC;
  --blue-mid: #0066FF;
  --cyan: #00D4FF;
  --blue-light: #EEF4FF;
  --surface: #ffffff;
  --surface-2: #F8FAFF;
  --surface-3: #EEF4FF;
  --border: #E2EAF8;
  --border-2: #C8D8F5;
  --text: #0F1C38;
  --text-2: #3D4F73;
  --text-3: #8896B3;
  --shadow-sm: 0 1px 4px rgba(0,50,150,0.06);
  --shadow-md: 0 4px 20px rgba(0,50,150,0.08), 0 1px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 20px 60px rgba(0,50,150,0.13), 0 4px 16px rgba(0,0,0,0.05);
  --shadow-bubble: 0 2px 8px rgba(0,50,150,0.08);
  --radius: 24px;
  --radius-msg: 20px;
  --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

.lrc-page {
  min-height: 100vh;
  background: #0A1628;
  background-image: 
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,82,204,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 90%, rgba(0,180,220,0.2) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 60% 30%, rgba(0,212,255,0.1) 0%, transparent 50%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  position: relative;
  overflow: hidden;
}

/* Grain texture overlay */
.lrc-page::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.4;
}

/* Floating orbs */
.lrc-page::after {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 65%);
  bottom: -200px; right: -150px;
  border-radius: 50%; pointer-events: none;
  animation: lrcOrb 8s ease-in-out infinite alternate;
}
@keyframes lrcOrb {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(-30px, -20px) scale(1.05); }
}

/* ── CARD ── */
.lrc-card {
  width: 100%;
  max-width: 420px;
  height: min(700px, calc(100dvh - 48px));
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius);
  box-shadow: 
    0 32px 80px rgba(0,10,40,0.5),
    0 8px 24px rgba(0,10,40,0.25),
    0 0 0 1px rgba(255,255,255,0.12),
    inset 0 1px 0 rgba(255,255,255,0.9);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  z-index: 1;
  animation: lrcReveal 0.6s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes lrcReveal {
  from { opacity:0; transform: translateY(32px) scale(0.96); }
  to   { opacity:1; transform: none; }
}

/* ── HEADER ── */
.lrc-header {
  padding: 16px 18px;
  background: linear-gradient(135deg, #061428 0%, #0040AA 55%, #0099DD 100%);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
/* Shimmer overlay */
.lrc-header::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(105deg, 
    transparent 30%, 
    rgba(255,255,255,0.06) 50%, 
    transparent 70%);
  pointer-events: none;
}
.lrc-header::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,0.05) 0%, transparent 100%);
  pointer-events: none;
}
.lrc-header-avatar {
  width: 44px; height: 44px;
  border-radius: 13px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  border: 1.5px solid rgba(255,255,255,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  position: relative; z-index: 1;
  overflow: hidden;
}
.lrc-header-avatar img {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 11px;
}
.lrc-header-info { flex: 1; position: relative; z-index: 1; min-width: 0; }
.lrc-header-name {
  font-size: 15px; font-weight: 700;
  color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.lrc-header-status {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: rgba(255,255,255,0.75);
  margin-top: 2px;
}
.lrc-header-lang {
  font-size: 11px; color: rgba(255,255,255,0.6);
  margin-top: 2px;
}
.lrc-status-dot {
  width: 6px; height: 6px;
  background: #4ade80;
  border-radius: 50%;
  box-shadow: 0 0 6px #4ade80;
  flex-shrink: 0;
  animation: lrcPulse 2.5s ease-in-out infinite;
}
@keyframes lrcPulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);} }
.lrc-header-lang-flag {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 100px;
  padding: 3px 8px;
  font-size: 12px;
  position: relative; z-index: 1;
  flex-shrink: 0;
}

/* ── MESSAGES ── */
.lrc-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  background: var(--surface-2);
  scroll-behavior: smooth;
  background-image: 
    radial-gradient(ellipse 60% 40% at 10% 20%, rgba(0,82,204,0.03) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 90% 80%, rgba(0,212,255,0.03) 0%, transparent 50%);
}
.lrc-messages::-webkit-scrollbar { width: 3px; }
.lrc-messages::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }

.lrc-date-sep {
  text-align: center;
  font-size: 11px; font-weight: 500; color: var(--text-3);
  margin: 10px 0 14px;
  display: flex; align-items: center; gap: 10px;
  letter-spacing: 0.3px;
}
.lrc-date-sep::before, .lrc-date-sep::after {
  content: ''; flex: 1; height: 1px; 
  background: linear-gradient(to right, transparent, var(--border), transparent);
}

.lrc-msg-row {
  display: flex;
  gap: 9px;
  align-items: flex-end;
  animation: lrcMsgIn 0.35s cubic-bezier(0.16,1,0.3,1) both;
  margin-bottom: 10px;
}
@keyframes lrcMsgIn {
  from { opacity:0; transform: translateY(12px) scale(0.98); }
  to   { opacity:1; transform: none; }
}
.lrc-msg-row.user { flex-direction: row-reverse; }

.lrc-msg-avatar {
  width: 30px; height: 30px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--blue), var(--cyan));
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,82,204,0.2);
  overflow: hidden;
  border: 1.5px solid rgba(255,255,255,0.8);
}
.lrc-msg-avatar img {
  width: 100%; height: 100%;
  object-fit: cover;
}

.lrc-msg-content { max-width: 80%; display: flex; flex-direction: column; gap: 4px; }
.lrc-msg-row.user .lrc-msg-content { align-items: flex-end; }

.lrc-bubble {
  padding: 12px 16px;
  line-height: 1.6;
  font-size: 14px;
  font-weight: 400;
  word-break: break-word;
  font-family: var(--font);
  position: relative;
}
.lrc-bubble.ai {
  background: #ffffff;
  color: var(--text);
  border-radius: 4px var(--radius-msg) var(--radius-msg) var(--radius-msg);
  box-shadow: 
    0 1px 3px rgba(0,30,100,0.06),
    0 4px 16px rgba(0,30,100,0.07),
    inset 0 1px 0 rgba(255,255,255,1);
  border: 1px solid rgba(0,82,204,0.08);
}
.lrc-bubble.user {
  background: linear-gradient(135deg, #0052CC 0%, #0077EE 100%);
  color: #fff;
  border-radius: var(--radius-msg) 4px var(--radius-msg) var(--radius-msg);
  box-shadow: 
    0 4px 16px rgba(0,82,204,0.3),
    0 1px 4px rgba(0,82,204,0.2);
  font-weight: 500;
}
.lrc-msg-time { 
  font-size: 10px; 
  color: var(--text-3); 
  padding: 0 4px;
  letter-spacing: 0.2px;
}

/* Typing indicator */
.lrc-typing-row {
  display: flex; gap: 9px; align-items: flex-end;
  animation: lrcMsgIn 0.3s ease both;
  margin-bottom: 10px;
}
.lrc-typing-bubble {
  background: #ffffff;
  border: 1px solid rgba(0,82,204,0.08);
  border-radius: 4px var(--radius-msg) var(--radius-msg) var(--radius-msg);
  padding: 14px 18px;
  display: flex; gap: 5px; align-items: center;
  box-shadow: 0 2px 10px rgba(0,30,100,0.07);
}
.lrc-typing-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--blue);
  opacity: 0.35;
  animation: lrcBounce 1.2s ease-in-out infinite;
}
.lrc-typing-dot:nth-child(2) { animation-delay: 0.15s; }
.lrc-typing-dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes lrcBounce {
  0%,60%,100% { transform: translateY(0); opacity:0.4; }
  30% { transform: translateY(-7px); opacity:1; }
}

/* ── SUGGESTIONS ── */
.lrc-suggestions {
  padding: 10px 14px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  background: #ffffff;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  align-items: center;
}
.lrc-sug {
  padding: 7px 14px;
  background: var(--surface-2);
  border: 1.5px solid var(--border-2);
  border-radius: 100px;
  font-size: 12.5px; font-weight: 500;
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.18s cubic-bezier(0.16,1,0.3,1);
  white-space: nowrap;
  animation: lrcSugIn 0.3s cubic-bezier(0.16,1,0.3,1) both;
  font-family: var(--font);
  letter-spacing: -0.1px;
}
@keyframes lrcSugIn { 
  from { opacity:0; transform: translateY(6px) scale(0.94); }
  to   { opacity:1; transform: none; }
}
.lrc-sug:hover {
  background: var(--blue-light);
  border-color: rgba(0,82,204,0.25);
  color: var(--blue);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(0,82,204,0.1);
}
.lrc-sug.primary {
  background: linear-gradient(135deg, #0052CC, #0099DD);
  border-color: transparent;
  color: #fff;
  font-weight: 600;
  box-shadow: 0 4px 14px rgba(0,82,204,0.28);
  letter-spacing: -0.2px;
}
.lrc-sug.primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,82,204,0.38);
}

/* ── INPUT ── */
.lrc-input-area {
  padding: 12px 14px;
  background: #ffffff;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: center;
  flex-shrink: 0;
}
.lrc-input-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  background: var(--surface-2);
  border: 1.5px solid var(--border-2);
  border-radius: 100px;
  padding: 0 18px;
  transition: all 0.2s;
}
.lrc-input-wrap:focus-within {
  border-color: var(--blue-mid);
  background: #fff;
  box-shadow: 0 0 0 4px rgba(0,82,204,0.07), 0 2px 8px rgba(0,82,204,0.08);
}
.lrc-input {
  flex: 1;
  border: none;
  background: none;
  padding: 13px 0;
  font-size: 14px;
  font-family: var(--font);
  color: var(--text);
  outline: none;
  font-weight: 400;
}
.lrc-input::placeholder { color: var(--text-3); font-weight: 400; }
.lrc-send-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, #0052CC, #0099DD);
  border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
  box-shadow: 0 4px 14px rgba(0,82,204,0.32);
  color: #fff;
}
.lrc-send-btn:hover { 
  transform: scale(1.08) rotate(-5deg); 
  box-shadow: 0 6px 20px rgba(0,82,204,0.42); 
}
.lrc-send-btn:active { transform: scale(0.94); }
.lrc-send-btn:disabled { opacity:0.45; cursor:not-allowed; transform:none; }

/* ── FOOTER ── */
.lrc-footer {
  text-align: center;
  padding: 7px;
  font-size: 11px;
  color: var(--text-3);
  border-top: 1px solid var(--border);
  background: #ffffff;
  flex-shrink: 0;
  letter-spacing: 0.1px;
}
.lrc-footer a, .lrc-footer span { 
  color: var(--blue); 
  font-weight: 600; 
  text-decoration: none;
}

/* ── LOADING / ERROR ── */
.lrc-loading {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  background: var(--surface-2);
}
.lrc-spinner {
  width: 32px; height: 32px;
  border: 2.5px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: lrcSpin 0.7s linear infinite;
}
@keyframes lrcSpin { to { transform: rotate(360deg); } }
.lrc-loading-text { font-size: 14px; color: var(--text-3); }

.lrc-error {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  padding: 32px;
  background: var(--surface-2);
  text-align: center;
}
.lrc-error-icon { font-size: 40px; }
.lrc-error-title { font-size: 16px; font-weight: 700; color: var(--text); }
.lrc-error-desc { font-size: 13.5px; color: var(--text-3); line-height: 1.6; }

@media (max-width: 520px) {
  .lrc-page { padding: 0; align-items: stretch; }
  .lrc-card { max-width: 100%; height: 100dvh; border-radius: 0; }
}

/* Landscape mobile */
@media (max-height: 500px) and (orientation: landscape) {
  .lrc-page { padding: 0; align-items: stretch; }
  .lrc-card { 
    max-width: 100%; 
    height: 100dvh; 
    border-radius: 0;
    display: grid;
    grid-template-rows: auto 1fr auto auto;
  }
  .lrc-header { padding: 8px 16px; min-height: 48px; }
  .lrc-header-avatar { width: 32px; height: 32px; font-size: 16px; }
  .lrc-header-name { font-size: 13px; }
  .lrc-header-status { display: none; }
  .lrc-messages { padding: 8px 12px; }
  .lrc-suggestions { padding: 6px 12px; flex-wrap: nowrap; overflow-x: auto; }
  .lrc-suggestions::-webkit-scrollbar { display: none; }
  .lrc-input-area { padding: 8px 12px; }
  .lrc-rdv-grid { grid-template-columns: 1fr 1fr 1fr; }
  .lrc-footer { display: none; }
}

/* ── FORMULAIRE RDV ── */
.lrc-rdv-form {
  padding: 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  animation: lrcMsgIn 0.3s ease both;
}
.lrc-rdv-title {
  font-size: 14px; font-weight: 700; color: var(--text);
  margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.lrc-rdv-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;
}
.lrc-rdv-field {
  display: flex; flex-direction: column; gap: 4px;
}
.lrc-rdv-field label {
  font-size: 11px; font-weight: 600; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.lrc-rdv-field input, .lrc-rdv-field select {
  padding: 10px 12px;
  background: var(--surface-2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 14px; color: var(--text);
  outline: none; font-family: inherit;
  transition: border-color 0.2s;
}
.lrc-rdv-field input:focus, .lrc-rdv-field select:focus {
  border-color: var(--blue);
  background: #fff;
}
.lrc-rdv-field.full { grid-column: 1 / -1; }
.lrc-rdv-btns { display: flex; gap: 8px; }
.lrc-rdv-submit {
  flex: 1; padding: 12px;
  background: linear-gradient(135deg, var(--blue), var(--cyan));
  border: none; border-radius: 10px; color: #fff;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: all 0.2s; font-family: inherit;
  box-shadow: 0 4px 12px rgba(0,82,204,0.25);
}
.lrc-rdv-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0,82,204,0.35); }
.lrc-rdv-cancel {
  padding: 12px 16px;
  background: var(--surface-2); border: 1.5px solid var(--border);
  border-radius: 10px; color: var(--text-3);
  font-size: 13px; cursor: pointer; font-family: inherit;
  transition: all 0.2s;
}
.lrc-rdv-cancel:hover { background: var(--surface-3); }
@media (max-width: 400px) {
  .lrc-rdv-grid { grid-template-columns: 1fr; }
  .lrc-rdv-field.full { grid-column: 1; }
}

/* Badge démo */
.lrc-header-badge {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 100px;
  padding: 4px 10px;
  font-size: 11px; font-weight: 600; color: #fff;
  position: relative; z-index: 1;
  white-space: nowrap;
  flex-shrink: 0;
}</style>

<div class="lrc-page">
  <div class="lrc-card" id="lrcCard">

    <!-- HEADER -->
    <div class="lrc-header">
      <div class="lrc-header-avatar" id="lrcAvatar">💬</div>
      <div class="lrc-header-info">
        <div class="lrc-header-name" id="lrcName">Chargement...</div>
        <div class="lrc-header-status">
          <span class="lrc-status-dot"></span>
          <span>Assistant IA · En ligne 24/7</span>
        </div>
      </div>
      <div class="lrc-header-badge">Démo gratuite</div>
    </div>

    <!-- LOADING -->
    <div class="lrc-loading" id="lrcLoading">
      <div class="lrc-spinner"></div>
      <div class="lrc-loading-text">Connexion à l'assistant...</div>
    </div>

    <!-- MESSAGES -->
    <div class="lrc-messages" id="lrcMessages" style="display:none;">
      <div class="lrc-date-sep">Aujourd'hui</div>
    </div>

    <!-- SUGGESTIONS -->
    <div class="lrc-suggestions" id="lrcSuggestions" style="display:none;"></div>

    <!-- INPUT -->
    <div class="lrc-input-area" id="lrcInputArea" style="display:none;">
      <div class="lrc-input-wrap">
        <input class="lrc-input" id="lrcInput" type="text"
          placeholder="Posez votre question..."
          onkeypress="if(event.key==='Enter') lrcSend()">
      </div>
      <button class="lrc-send-btn" id="lrcSendBtn" onclick="lrcSend()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>

    <!-- FOOTER -->
    <div class="lrc-footer" id="lrcFooter" style="display:none;">
      Propulsé par <span>LocalReply AI</span>
    </div>

  </div>
</div>

<script>
const API = 'https://localreply-api.onrender.com';
const BUSINESS_ID = 1;
let bizAvatar = '🤖'; // Salon Marie — business de démo
const MAX_MSGS = 5;
const SUBSCRIBE_URL = 'https://localreply-frontend.vercel.app/auth';

let userMsgCount = 0;
let isSending = false;
let popupShown = false;
let sessionUserId = Math.floor(Math.random() * 2000000000);

const BIZ_ICONS = { salon:'💇',spa:'💅',massage:'💆',dentist:'🦷',restaurant:'🍽️',cafe:'☕',bakery:'🍞',gym:'🏋️',garage:'🔧',medical:'🏥',hotel:'🏨',retail:'🛍️',other:'💬' };

// Suggestions par défaut pour la démo (FR)
const SUGGESTIONS = {
  default: [
    { l:'💼 Voir les services', t:'Quels sont vos services ?' },
    { l:'💰 Voir les tarifs', t:'Quels sont vos tarifs ?' },
    { l:'📅 Prendre rendez-vous', t:'Je voudrais prendre un rendez-vous', p:true },
  ],
  rdv: [
    { l:'🗓️ Voir les disponibilités', t:'Quels créneaux sont disponibles ?' },
    { l:'⏱️ Durée du RDV', t:'Combien de temps dure le rendez-vous ?' },
    { l:'💰 Voir les tarifs', t:'Quels sont vos tarifs ?' },
  ],
  services: [
    { l:'💰 Voir les tarifs', t:'Quels sont vos tarifs ?' },
    { l:'📅 Réserver', t:'Je voudrais prendre un rendez-vous', p:true },
    { l:'⏰ Horaires', t:"Quels sont vos horaires d'ouverture ?" },
  ],
  horaires: [
    { l:'✅ Ouvert maintenant ?', t:"Êtes-vous ouverts en ce moment ?" },
    { l:'📅 Prendre rendez-vous', t:'Je voudrais prendre un rendez-vous', p:true },
    { l:'📍 Adresse', t:'Où êtes-vous situés ?' },
  ],
};

function detectIntent(text) {
  const t = (text||'').toLowerCase();
  if (/rdv|rendez.vous|réserv|créneau/i.test(t)) return 'rdv';
  if (/service|coupe|soin|presta/i.test(t)) return 'services';
  if (/heure|horaire|ouvert|fermé/i.test(t)) return 'horaires';
  return 'default';
}

function now() {
  return new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}
function esc(t) { return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function linkify(text) {
  return text.replace(/(https?:\/\/[^\s<>"]+)/g, function(url) {
    const display = url.length > 40 ? url.slice(0, 37) + '...' : url;
    return '<a href="' + url + '" target="_blank" rel="noopener" style="color:var(--blue);text-decoration:underline;">' + display + '</a>';
  });
}

function addMsg(text, isUser=false, isHtml=false) {
  const c = document.getElementById('lrcMessages');
  const row = document.createElement('div');
  row.className = 'lrc-msg-row' + (isUser ? ' user' : '');
  if (isUser) {
    row.innerHTML = `<div class="lrc-msg-content"><div class="lrc-bubble user">${esc(text)}</div><div class="lrc-msg-time">${now()}</div></div>`;
  } else {
    const content = isHtml ? linkify(text) : linkify(esc(text));
    row.innerHTML = `<div class="lrc-msg-avatar">${bizAvatar||'🤖'}</div><div class="lrc-msg-content"><div class="lrc-bubble ai">${content}</div><div class="lrc-msg-time">${now()}</div></div>`;
  }
  c.appendChild(row);
  c.scrollTop = c.scrollHeight;
}

function showTyping() {
  const c = document.getElementById('lrcMessages');
  const row = document.createElement('div');
  row.id = 'lrcTyping';
  row.className = 'lrc-typing-row';
  row.innerHTML = `<div class="lrc-msg-avatar">🤖</div><div class="lrc-typing-bubble"><span class="lrc-typing-dot"></span><span class="lrc-typing-dot"></span><span class="lrc-typing-dot"></span></div>`;
  c.appendChild(row);
  c.scrollTop = c.scrollHeight;
}
function removeTyping() { document.getElementById('lrcTyping')?.remove(); }

function addEmojiToSuggestion(text) {
  const t = text.toLowerCase();
  if (/rdv|rendez|réserv|book|termin|réserver|prendre/i.test(t)) return '📅 ' + text;
  if (/tarif|prix|price|coût|combien/i.test(t)) return '💰 ' + text;
  if (/service|presta|soin|coupe/i.test(t)) return '💼 ' + text;
  if (/horaire|heure|ouvert|fermé/i.test(t)) return '⏰ ' + text;
  if (/adresse|où|accès/i.test(t)) return '📍 ' + text;
  if (/paiement|carte|moyen/i.test(t)) return '💳 ' + text;
  return text;
}

function renderSuggestionsFromBackend(suggestions) {
  const wrap = document.getElementById('lrcSuggestions');
  if (!suggestions || !suggestions.length) { renderSuggestions('default'); return; }
  wrap.style.display = 'flex';
  wrap.innerHTML = '';
  suggestions.forEach((s, i) => {
    const btn = document.createElement('button');
    const isRdv = /rdv|réserv|book|rendez|termin/i.test(s);
    btn.className = 'lrc-sug' + (isRdv ? ' primary' : '');
    btn.style.animationDelay = (i * 0.08) + 's';
    btn.textContent = addEmojiToSuggestion(s);
    btn.onclick = isRdv ? () => openRdvForm() : () => lrcSendText(s);
    wrap.appendChild(btn);
  });
}

function renderSuggestions(intent) {
  const wrap = document.getElementById('lrcSuggestions');
  const items = SUGGESTIONS[intent] || SUGGESTIONS.default;
  wrap.innerHTML = '';
  items.forEach((s,i) => {
    const btn = document.createElement('button');
    btn.className = 'lrc-sug' + (s.p ? ' primary' : '');
    btn.style.animationDelay = (i*0.07)+'s';
    btn.textContent = s.l;
    const isRdvStatic = s.p || /rdv|réserv|rendez/i.test(s.l);
    btn.onclick = isRdvStatic ? () => openRdvForm() : () => lrcSendText(s.t);
    wrap.appendChild(btn);
  });
}

function showSubscribePopup() {
  if (popupShown) return;
  popupShown = true;
  const overlay = document.createElement('div');
  overlay.className = 'lrc-subscribe-overlay';
  overlay.id = 'lrcOverlay';
  overlay.innerHTML = `
    <div class="lrc-subscribe-card">
      <span class="lrc-sub-icon">🚀</span>
      <div class="lrc-sub-title">Vous avez adoré la démo !</div>
      <p class="lrc-sub-desc">Offrez cet assistant IA à votre propre commerce — disponible 24h/24 pour vos clients.</p>
      <div class="lrc-sub-feats">
        <div class="lrc-sub-feat"><span class="lrc-sub-feat-check">✓</span> 6 langues automatiques</div>
        <div class="lrc-sub-feat"><span class="lrc-sub-feat-check">✓</span> FAQ, services, horaires, RDV</div>
        <div class="lrc-sub-feat"><span class="lrc-sub-feat-check">✓</span> Opérationnel en 5 minutes</div>
        <div class="lrc-sub-feat"><span class="lrc-sub-feat-check">✓</span> Essai gratuit 14 jours</div>
      </div>
      <a href="${SUBSCRIBE_URL}" class="lrc-sub-cta">Créer mon compte →</a>
      <button class="lrc-sub-dismiss" onclick="document.getElementById('lrcOverlay').remove()">Continuer la démo</button>
    </div>`;
  document.getElementById('lrcCard').appendChild(overlay);
}

async function lrcSend() {
  if (isSending) return;
  const input = document.getElementById('lrcInput');
  const text = input.value.trim();
  if (!text) return;
  lrcSendText(text);
  input.value = '';
}

async function lrcSendText(text) {
  if (isSending) return;
  isSending = true;
  document.getElementById('lrcSendBtn').disabled = true;
  document.getElementById('lrcSuggestions').innerHTML = '';

  addMsg(text, true);
  userMsgCount++;

  if (MAX_MSGS - userMsgCount > 0 && MAX_MSGS - userMsgCount <= 2) {
    const rem = MAX_MSGS - userMsgCount;
    const c = document.getElementById('lrcMessages');
    const d = document.createElement('div');
    d.style.cssText = 'text-align:center;font-size:11.5px;color:#8b95b0;padding:4px 0;font-style:italic;';
    d.textContent = `💬 ${rem} message${rem>1?'s':''} gratuit${rem>1?'s':''} restant${rem>1?'s':''}`;
    c.appendChild(d);
  }

  showTyping();

  // Afficher indicateur de chargement
  removeTyping();
  const c = document.getElementById('lrcMessages');
  const row = document.createElement('div');
  row.className = 'lrc-msg-row';
  row.innerHTML = '<div class="lrc-msg-avatar">🤖</div><div class="lrc-msg-content"><div class="lrc-bubble ai" id="lrcStream">···</div><div class="lrc-msg-time" id="lrcStreamTime"></div></div>';
  c.appendChild(row);
  const bubble = document.getElementById('lrcStream');
  c.scrollTop = c.scrollHeight;

  // Animation points de chargement
  let dots = 0;
  const dotsInterval = setInterval(() => {
    dots = (dots + 1) % 4;
    if (bubble) bubble.textContent = '·'.repeat(dots + 1) || '·';
  }, 400);

  try {
    const r = await fetch(API + '/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message: text, business_id: BUSINESS_ID, user_id: sessionUserId, source: 'demo' })
    });
    
    clearInterval(dotsInterval);
    
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    const msg = data.message || data.response || '';
    
    if (bubble) {
      bubble.textContent = msg || 'Désolé, je n\'ai pas pu répondre.';
      bubble.id = '';
    }
    const timeEl = document.getElementById('lrcStreamTime');
    if (timeEl) { timeEl.textContent = now(); timeEl.id = ''; }
    
    // Auto-ouvrir formulaire RDV si l'IA demande des infos
    const userWantsRdvD = /rdv|rendez.vous|réserv|book|appointment|créneau|prendre|venir/i.test(text);
    const aiAsksInfoD = /nom|téléphone|service|date|heure|informations|besoin de|quel service|quelle date|numéro|souhaitez/i.test(msg);
    const rdvFormD = document.getElementById('lrcRdvForm');
    if (userWantsRdvD && aiAsksInfoD && rdvFormD && rdvFormD.style.display === 'none') {
      setTimeout(() => openRdvForm(), 400);
    }

    if (data.suggestions && data.suggestions.length) {
      renderSuggestionsFromBackend(data.suggestions);
    } else {
      renderSuggestions(detectIntent(msg + ' ' + text));
    }
    
  } catch(err) {
    clearInterval(dotsInterval);
    console.warn('Chat error:', err.message);
    if (bubble) {
      bubble.textContent = '⚠️ Service momentanément indisponible.';
      bubble.id = '';
    }
    const timeEl = document.getElementById('lrcStreamTime');
    if (timeEl) { timeEl.textContent = now(); timeEl.id = ''; }
  }

  document.getElementById('lrcInput').focus();

  if (userMsgCount >= MAX_MSGS) setTimeout(showSubscribePopup, 800);
}

async function lrcInit() {
  try {
    const res = await fetch(`${API}/api/business/${BUSINESS_ID}/config`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const biz = data.business || {};

    // Avatar : logo > initiales > emoji
    const avatarEl = document.getElementById('lrcAvatar');
    const bizIcon = BIZ_ICONS[biz.business_type] || '💬';
    if (biz.logo_url) {
      bizAvatar = `<img src="${biz.logo_url}" style="width:100%;height:100%;object-fit:cover;border-radius:10px;" onerror="this.parentElement.textContent='${bizIcon}'">`;
      avatarEl.innerHTML = bizAvatar;
    } else {
      const initials = (biz.name||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
      if (initials.length >= 2) {
        bizAvatar = `<span style="font-size:12px;font-weight:700;color:#fff;">${initials}</span>`;
        avatarEl.innerHTML = bizAvatar;
      } else {
        bizAvatar = bizIcon;
        avatarEl.textContent = bizIcon;
      }
    }
    document.getElementById('lrcName').textContent = biz.name || 'Assistant LocalReply';

    document.getElementById('lrcLoading').style.display = 'none';
    document.getElementById('lrcMessages').style.display = 'flex';
    document.getElementById('lrcSuggestions').style.display = 'flex';
    document.getElementById('lrcInputArea').style.display = 'flex';
    document.getElementById('lrcFooter').style.display = 'block';

    addMsg(`Bonjour ! 👋 Je suis l'assistant de <strong>${biz.name||'ce commerce'}</strong>.<br>Comment puis-je vous aider ?`, false, true);
    renderSuggestions('default');
    setTimeout(() => document.getElementById('lrcInput').focus(), 300);
  } catch {
    document.getElementById('lrcName').textContent = 'Assistant LocalReply';
    document.getElementById('lrcAvatar').textContent = '💬';
    document.getElementById('lrcLoading').style.display = 'none';
    document.getElementById('lrcMessages').style.display = 'flex';
    document.getElementById('lrcSuggestions').style.display = 'flex';
    document.getElementById('lrcInputArea').style.display = 'flex';
    document.getElementById('lrcFooter').style.display = 'block';
    addMsg("Bonjour ! 👋 Je suis votre assistant IA LocalReply. Comment puis-je vous aider ?");
    renderSuggestions('default');
  }
}

lrcInit();
</script>
