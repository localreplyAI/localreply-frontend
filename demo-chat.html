<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Démo — LocalReply</title>
  <meta name="description" content="LocalReply — Assistant IA 24/7 pour petits commerces">
  <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(145deg, #f0f4fb 0%, #e8f0fb 50%, #f5f7fa 100%); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; min-height: 100vh; overflow-x: hidden; }
  </style>

</head>
<body>
<style>
:root {
  --blue: #0052CC;
  --cyan: #00D4FF;
  --blue-light: #e8f0fb;
  --surface: #ffffff;
  --surface-2: #f7f9fc;
  --surface-3: #eef2f8;
  --border: #e4e9f2;
  --text: #1a2340;
  --text-2: #4b5675;
  --text-3: #8b95b0;
  --shadow-sm: 0 1px 3px rgba(0,82,204,0.08), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,82,204,0.1), 0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg: 0 12px 40px rgba(0,82,204,0.12), 0 4px 16px rgba(0,0,0,0.06);
  --radius: 20px;
  --radius-msg: 18px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

.lrc-page {
  min-height: 100vh;
  background: linear-gradient(145deg, #f0f4fb 0%, #e8f0fb 50%, #f5f7fa 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  -webkit-font-smoothing: antialiased;
  position: relative;
  overflow: hidden;
}

/* Orbes de fond */
.lrc-page::before {
  content: '';
  position: absolute;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(0,82,204,0.06) 0%, transparent 70%);
  top: -100px; right: -100px;
  border-radius: 50%;
  pointer-events: none;
}
.lrc-page::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(0,212,255,0.05) 0%, transparent 70%);
  bottom: -100px; left: -50px;
  border-radius: 50%;
  pointer-events: none;
}

/* ── CARD ── */
.lrc-card {
  width: 100%;
  max-width: 480px;
  height: min(720px, calc(100dvh - 64px));
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(0,82,204,0.06);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  z-index: 1;
  animation: lrcReveal 0.5s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes lrcReveal {
  from { opacity:0; transform: translateY(24px) scale(0.97); }
  to   { opacity:1; transform: none; }
}

/* ── HEADER ── */
.lrc-header {
  padding: 18px 20px;
  background: linear-gradient(135deg, #0A1628 0%, #0052CC 60%, #00D4FF 100%);
  display: flex;
  align-items: center;
  gap: 13px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.lrc-header::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 50%);
  pointer-events: none;
}

.lrc-header-avatar {
  width: 44px; height: 44px;
  border-radius: 13px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  border: 1.5px solid rgba(255,255,255,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  position: relative; z-index: 1;
}
.lrc-header-info { flex: 1; position: relative; z-index: 1; min-width: 0; }
.lrc-header-name {
  font-size: 15px; font-weight: 700;
  color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.lrc-header-status {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: rgba(255,255,255,0.75);
  margin-top: 2px;
}
.lrc-status-dot {
  width: 6px; height: 6px;
  background: #4ade80;
  border-radius: 50%;
  box-shadow: 0 0 6px #4ade80;
  flex-shrink: 0;
  animation: lrcPulse 2.5s ease-in-out infinite;
}
@keyframes lrcPulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);} }

.lrc-header-badge {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 100px;
  padding: 4px 10px;
  font-size: 11px; font-weight: 600; color: #fff;
  position: relative; z-index: 1;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── MESSAGES ── */
.lrc-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  background: var(--surface-2);
  scroll-behavior: smooth;
}
.lrc-messages::-webkit-scrollbar { width: 3px; }
.lrc-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Date separator */
.lrc-date-sep {
  text-align: center;
  font-size: 11px;
  color: var(--text-3);
  margin: 8px 0;
  display: flex; align-items: center; gap: 10px;
}
.lrc-date-sep::before, .lrc-date-sep::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* Message rows */
.lrc-msg-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  animation: lrcMsgIn 0.3s cubic-bezier(0.16,1,0.3,1) both;
  margin-bottom: 8px;
}
@keyframes lrcMsgIn {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: none; }
}
.lrc-msg-row.user { flex-direction: row-reverse; }

.lrc-msg-avatar {
  width: 28px; height: 28px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--blue), var(--cyan));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}

.lrc-msg-content { max-width: 78%; display: flex; flex-direction: column; gap: 3px; }
.lrc-msg-row.user .lrc-msg-content { align-items: flex-end; }

.lrc-bubble {
  padding: 11px 15px;
  line-height: 1.55;
  font-size: 14.5px;
  word-break: break-word;
  position: relative;
}

/* Bulle IA */
.lrc-bubble.ai {
  background: var(--surface);
  color: var(--text);
  border-radius: var(--radius-msg) var(--radius-msg) var(--radius-msg) 4px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
}

/* Bulle user */
.lrc-bubble.user {
  background: linear-gradient(135deg, var(--blue) 0%, #0070e8 100%);
  color: #fff;
  border-radius: var(--radius-msg) var(--radius-msg) 4px var(--radius-msg);
  box-shadow: 0 4px 14px rgba(0,82,204,0.25);
}

.lrc-msg-time {
  font-size: 10.5px;
  color: var(--text-3);
  padding: 0 4px;
}

/* Typing indicator */
.lrc-typing-row {
  display: flex; gap: 8px; align-items: flex-end;
  animation: lrcMsgIn 0.3s ease both;
  margin-bottom: 8px;
}
.lrc-typing-bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-msg) var(--radius-msg) var(--radius-msg) 4px;
  padding: 13px 16px;
  display: flex; gap: 4px; align-items: center;
  box-shadow: var(--shadow-sm);
}
.lrc-typing-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--blue);
  opacity: 0.4;
  animation: lrcBounce 1.2s ease-in-out infinite;
}
.lrc-typing-dot:nth-child(2) { animation-delay: 0.15s; }
.lrc-typing-dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes lrcBounce {
  0%,60%,100% { transform: translateY(0); opacity:0.4; }
  30% { transform: translateY(-7px); opacity:1; }
}

/* ── SUGGESTIONS ── */
.lrc-suggestions {
  padding: 10px 16px;
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 50px;
  align-items: center;
}
.lrc-sug {
  padding: 7px 13px;
  background: var(--blue-light);
  border: 1.5px solid rgba(0,82,204,0.15);
  border-radius: 100px;
  font-size: 12.5px; font-weight: 500;
  color: var(--blue);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  animation: lrcSugIn 0.25s ease both;
}
@keyframes lrcSugIn { from{opacity:0;transform:scale(0.92);}to{opacity:1;transform:none;} }
.lrc-sug:hover {
  background: rgba(0,82,204,0.12);
  border-color: rgba(0,82,204,0.3);
  transform: translateY(-1px);
  box-shadow: 0 3px 8px rgba(0,82,204,0.12);
}
.lrc-sug.primary {
  background: linear-gradient(135deg, var(--blue), var(--cyan));
  border-color: transparent;
  color: #fff;
  font-weight: 600;
  box-shadow: 0 3px 10px rgba(0,82,204,0.25);
}
.lrc-sug.primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 5px 16px rgba(0,82,204,0.35);
}

/* ── INPUT ── */
.lrc-input-area {
  padding: 12px 14px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: center;
  flex-shrink: 0;
}
.lrc-input-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  background: var(--surface-2);
  border: 1.5px solid var(--border);
  border-radius: 100px;
  padding: 0 16px;
  transition: all 0.2s;
  gap: 8px;
}
.lrc-input-wrap:focus-within {
  border-color: var(--blue);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(0,82,204,0.08);
}
.lrc-input {
  flex: 1;
  border: none;
  background: none;
  padding: 12px 0;
  font-size: 14.5px;
  font-family: inherit;
  color: var(--text);
  outline: none;
}
.lrc-input::placeholder { color: var(--text-3); }

.lrc-send-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), var(--cyan));
  border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
  box-shadow: 0 4px 12px rgba(0,82,204,0.3);
  color: #fff;
  font-size: 17px;
}
.lrc-send-btn:hover { transform: scale(1.07); box-shadow: 0 6px 18px rgba(0,82,204,0.4); }
.lrc-send-btn:active { transform: scale(0.95); }
.lrc-send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ── FOOTER ── */
.lrc-footer {
  text-align: center;
  padding: 7px;
  font-size: 11px;
  color: var(--text-3);
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.lrc-footer span { color: var(--blue); font-weight: 600; }

/* ── LOADING / ERROR ── */
.lrc-loading {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  background: var(--surface-2);
}
.lrc-spinner {
  width: 32px; height: 32px;
  border: 2.5px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: lrcSpin 0.7s linear infinite;
}
@keyframes lrcSpin { to { transform: rotate(360deg); } }
.lrc-loading-text { font-size: 14px; color: var(--text-3); }

/* ── POPUP ABONNEMENT (démo only) ── */
.lrc-subscribe-overlay {
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
  border-radius: var(--radius);
  animation: lrcFadeIn 0.3s ease both;
  padding: 20px;
}
@keyframes lrcFadeIn { from{opacity:0;}to{opacity:1;} }
.lrc-subscribe-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px 28px;
  text-align: center;
  max-width: 360px; width: 100%;
  box-shadow: var(--shadow-lg);
  animation: lrcCardPop 0.4s cubic-bezier(0.16,1,0.3,1) 0.1s both;
}
@keyframes lrcCardPop { from{opacity:0;transform:scale(0.92) translateY(16px);}to{opacity:1;transform:none;} }
.lrc-sub-icon { font-size: 48px; margin-bottom: 14px; display: block;
  animation: lrcSubFloat 3s ease-in-out infinite; }
@keyframes lrcSubFloat { 0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);} }
.lrc-sub-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.lrc-sub-desc { font-size: 14px; color: var(--text-2); line-height: 1.6; margin-bottom: 22px; }
.lrc-sub-feats { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; text-align: left; }
.lrc-sub-feat { display: flex; align-items: center; gap: 9px; font-size: 13.5px; color: var(--text-2); }
.lrc-sub-feat-check { color: var(--blue); font-weight: 700; }
.lrc-sub-cta {
  display: block; width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--blue), var(--cyan));
  border-radius: 12px; color: #fff; font-size: 15px; font-weight: 700;
  text-decoration: none; margin-bottom: 10px;
  box-shadow: 0 6px 18px rgba(0,82,204,0.3);
  transition: all 0.2s;
}
.lrc-sub-cta:hover { transform: translateY(-2px); box-shadow: 0 9px 24px rgba(0,82,204,0.4); }
.lrc-sub-dismiss {
  background: none; border: none; font-size: 13px; color: var(--text-3);
  cursor: pointer; font-family: inherit; transition: color 0.2s;
}
.lrc-sub-dismiss:hover { color: var(--text-2); }

@media (max-width: 520px) {
  .lrc-page { padding: 0; align-items: stretch; }
  .lrc-card { max-width: 100%; height: 100dvh; border-radius: 0; }
}
</style>

<div class="lrc-page">
  <div class="lrc-card" id="lrcCard">

    <!-- HEADER -->
    <div class="lrc-header">
      <div class="lrc-header-avatar" id="lrcAvatar">💬</div>
      <div class="lrc-header-info">
        <div class="lrc-header-name" id="lrcName">Chargement...</div>
        <div class="lrc-header-status">
          <span class="lrc-status-dot"></span>
          <span>Assistant IA · En ligne 24/7</span>
        </div>
      </div>
      <div class="lrc-header-badge">Démo gratuite</div>
    </div>

    <!-- LOADING -->
    <div class="lrc-loading" id="lrcLoading">
      <div class="lrc-spinner"></div>
      <div class="lrc-loading-text">Connexion à l'assistant...</div>
    </div>

    <!-- MESSAGES -->
    <div class="lrc-messages" id="lrcMessages" style="display:none;">
      <div class="lrc-date-sep">Aujourd'hui</div>
    </div>

    <!-- SUGGESTIONS -->
    <div class="lrc-suggestions" id="lrcSuggestions" style="display:none;"></div>

    <!-- INPUT -->
    <div class="lrc-input-area" id="lrcInputArea" style="display:none;">
      <div class="lrc-input-wrap">
        <input class="lrc-input" id="lrcInput" type="text"
          placeholder="Posez votre question..."
          onkeypress="if(event.key==='Enter') lrcSend()">
      </div>
      <button class="lrc-send-btn" id="lrcSendBtn" onclick="lrcSend()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>

    <!-- FOOTER -->
    <div class="lrc-footer" id="lrcFooter" style="display:none;">
      Propulsé par <span>LocalReply AI</span>
    </div>

  </div>
</div>

<script>
const API = 'https://localreply-api.onrender.com';
const BUSINESS_ID = 1; // Salon Marie — business de démo
const MAX_MSGS = 5;
const SUBSCRIBE_URL = 'https://localreply-frontend.vercel.app/auth';

let userMsgCount = 0;
let isSending = false;
let popupShown = false;
let sessionUserId = Math.floor(Math.random() * 2000000000);

const BIZ_ICONS = { salon:'💇',spa:'💅',massage:'💆',dentist:'🦷',restaurant:'🍽️',cafe:'☕',bakery:'🍞',gym:'🏋️',garage:'🔧',medical:'🏥',hotel:'🏨',retail:'🛍️',other:'💬' };

// Suggestions par défaut pour la démo (FR)
const SUGGESTIONS = {
  default: [
    { l:'💼 Voir les services', t:'Quels sont vos services ?' },
    { l:'💰 Voir les tarifs', t:'Quels sont vos tarifs ?' },
    { l:'📅 Prendre rendez-vous', t:'Je voudrais prendre un rendez-vous', p:true },
  ],
  rdv: [
    { l:'🗓️ Voir les disponibilités', t:'Quels créneaux sont disponibles ?' },
    { l:'⏱️ Durée du RDV', t:'Combien de temps dure le rendez-vous ?' },
    { l:'💰 Voir les tarifs', t:'Quels sont vos tarifs ?' },
  ],
  services: [
    { l:'💰 Voir les tarifs', t:'Quels sont vos tarifs ?' },
    { l:'📅 Réserver', t:'Je voudrais prendre un rendez-vous', p:true },
    { l:'⏰ Horaires', t:"Quels sont vos horaires d'ouverture ?" },
  ],
  horaires: [
    { l:'✅ Ouvert maintenant ?', t:"Êtes-vous ouverts en ce moment ?" },
    { l:'📅 Prendre rendez-vous', t:'Je voudrais prendre un rendez-vous', p:true },
    { l:'📍 Adresse', t:'Où êtes-vous situés ?' },
  ],
};

function detectIntent(text) {
  const t = (text||'').toLowerCase();
  if (/rdv|rendez.vous|réserv|créneau/i.test(t)) return 'rdv';
  if (/service|coupe|soin|presta/i.test(t)) return 'services';
  if (/heure|horaire|ouvert|fermé/i.test(t)) return 'horaires';
  return 'default';
}

function now() {
  return new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}
function esc(t) { return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function addMsg(text, isUser=false) {
  const c = document.getElementById('lrcMessages');
  const row = document.createElement('div');
  row.className = 'lrc-msg-row' + (isUser ? ' user' : '');
  if (isUser) {
    row.innerHTML = `<div class="lrc-msg-content"><div class="lrc-bubble user">${esc(text)}</div><div class="lrc-msg-time">${now()}</div></div>`;
  } else {
    row.innerHTML = `<div class="lrc-msg-avatar">🤖</div><div class="lrc-msg-content"><div class="lrc-bubble ai">${text}</div><div class="lrc-msg-time">${now()}</div></div>`;
  }
  c.appendChild(row);
  c.scrollTop = c.scrollHeight;
}

function showTyping() {
  const c = document.getElementById('lrcMessages');
  const row = document.createElement('div');
  row.id = 'lrcTyping';
  row.className = 'lrc-typing-row';
  row.innerHTML = `<div class="lrc-msg-avatar">🤖</div><div class="lrc-typing-bubble"><span class="lrc-typing-dot"></span><span class="lrc-typing-dot"></span><span class="lrc-typing-dot"></span></div>`;
  c.appendChild(row);
  c.scrollTop = c.scrollHeight;
}
function removeTyping() { document.getElementById('lrcTyping')?.remove(); }

function renderSuggestionsFromBackend(suggestions) {
  const wrap = document.getElementById('lrcSuggestions');
  if (!suggestions || !suggestions.length) { renderSuggestions('default'); return; }
  wrap.innerHTML = '';
  suggestions.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'lrc-sug' + (/rdv|réserv|book|termin/i.test(s) ? ' primary' : '');
    btn.style.animationDelay = (i * 0.07) + 's';
    btn.textContent = s;
    btn.onclick = () => lrcSendText(s.replace(/^[^\w\s]+\s*/, '').trim());
    wrap.appendChild(btn);
  });
}

function renderSuggestions(intent) {
  const wrap = document.getElementById('lrcSuggestions');
  const items = SUGGESTIONS[intent] || SUGGESTIONS.default;
  wrap.innerHTML = '';
  items.forEach((s,i) => {
    const btn = document.createElement('button');
    btn.className = 'lrc-sug' + (s.p ? ' primary' : '');
    btn.style.animationDelay = (i*0.07)+'s';
    btn.textContent = s.l;
    btn.onclick = () => lrcSendText(s.t);
    wrap.appendChild(btn);
  });
}

function showSubscribePopup() {
  if (popupShown) return;
  popupShown = true;
  const overlay = document.createElement('div');
  overlay.className = 'lrc-subscribe-overlay';
  overlay.id = 'lrcOverlay';
  overlay.innerHTML = `
    <div class="lrc-subscribe-card">
      <span class="lrc-sub-icon">🚀</span>
      <div class="lrc-sub-title">Vous avez adoré la démo !</div>
      <p class="lrc-sub-desc">Offrez cet assistant IA à votre propre commerce — disponible 24h/24 pour vos clients.</p>
      <div class="lrc-sub-feats">
        <div class="lrc-sub-feat"><span class="lrc-sub-feat-check">✓</span> 6 langues automatiques</div>
        <div class="lrc-sub-feat"><span class="lrc-sub-feat-check">✓</span> FAQ, services, horaires, RDV</div>
        <div class="lrc-sub-feat"><span class="lrc-sub-feat-check">✓</span> Opérationnel en 5 minutes</div>
        <div class="lrc-sub-feat"><span class="lrc-sub-feat-check">✓</span> Essai gratuit 14 jours</div>
      </div>
      <a href="${SUBSCRIBE_URL}" class="lrc-sub-cta">Créer mon compte →</a>
      <button class="lrc-sub-dismiss" onclick="document.getElementById('lrcOverlay').remove()">Continuer la démo</button>
    </div>`;
  document.getElementById('lrcCard').appendChild(overlay);
}

async function lrcSend() {
  if (isSending) return;
  const input = document.getElementById('lrcInput');
  const text = input.value.trim();
  if (!text) return;
  lrcSendText(text);
  input.value = '';
}

async function lrcSendText(text) {
  if (isSending) return;
  isSending = true;
  document.getElementById('lrcSendBtn').disabled = true;
  document.getElementById('lrcSuggestions').innerHTML = '';

  addMsg(text, true);
  userMsgCount++;

  if (MAX_MSGS - userMsgCount > 0 && MAX_MSGS - userMsgCount <= 2) {
    const rem = MAX_MSGS - userMsgCount;
    const c = document.getElementById('lrcMessages');
    const d = document.createElement('div');
    d.style.cssText = 'text-align:center;font-size:11.5px;color:#8b95b0;padding:4px 0;font-style:italic;';
    d.textContent = `💬 ${rem} message${rem>1?'s':''} gratuit${rem>1?'s':''} restant${rem>1?'s':''}`;
    c.appendChild(d);
  }

  showTyping();

  // Afficher indicateur de chargement
  removeTyping();
  const c = document.getElementById('lrcMessages');
  const row = document.createElement('div');
  row.className = 'lrc-msg-row';
  row.innerHTML = '<div class="lrc-msg-avatar">🤖</div><div class="lrc-msg-content"><div class="lrc-bubble ai" id="lrcStream">···</div><div class="lrc-msg-time" id="lrcStreamTime"></div></div>';
  c.appendChild(row);
  const bubble = document.getElementById('lrcStream');
  c.scrollTop = c.scrollHeight;

  // Animation points de chargement
  let dots = 0;
  const dotsInterval = setInterval(() => {
    dots = (dots + 1) % 4;
    if (bubble) bubble.textContent = '·'.repeat(dots + 1) || '·';
  }, 400);

  try {
    const r = await fetch(API + '/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message: text, business_id: BUSINESS_ID, user_id: sessionUserId, source: 'demo' })
    });
    
    clearInterval(dotsInterval);
    
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    const msg = data.message || data.response || '';
    
    if (bubble) {
      bubble.textContent = msg || 'Désolé, je n\'ai pas pu répondre.';
      bubble.id = '';
    }
    const timeEl = document.getElementById('lrcStreamTime');
    if (timeEl) { timeEl.textContent = now(); timeEl.id = ''; }
    
    if (data.suggestions && data.suggestions.length) {
      renderSuggestionsFromBackend(data.suggestions);
    } else {
      renderSuggestions(detectIntent(msg + ' ' + text));
    }
    
  } catch(err) {
    clearInterval(dotsInterval);
    console.warn('Chat error:', err.message);
    if (bubble) {
      bubble.textContent = '⚠️ Service momentanément indisponible.';
      bubble.id = '';
    }
    const timeEl = document.getElementById('lrcStreamTime');
    if (timeEl) { timeEl.textContent = now(); timeEl.id = ''; }
  }

  document.getElementById('lrcInput').focus();

  if (userMsgCount >= MAX_MSGS) setTimeout(showSubscribePopup, 800);
}

async function lrcInit() {
  try {
    const res = await fetch(`${API}/api/business/${BUSINESS_ID}/config`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const biz = data.business || {};

    document.getElementById('lrcAvatar').textContent = BIZ_ICONS[biz.business_type] || '💬';
    document.getElementById('lrcName').textContent = biz.name || 'Assistant LocalReply';

    document.getElementById('lrcLoading').style.display = 'none';
    document.getElementById('lrcMessages').style.display = 'flex';
    document.getElementById('lrcSuggestions').style.display = 'flex';
    document.getElementById('lrcInputArea').style.display = 'flex';
    document.getElementById('lrcFooter').style.display = 'block';

    addMsg(`Bonjour ! 👋 Je suis l'assistant de <strong>${biz.name||'ce commerce'}</strong>.<br>Comment puis-je vous aider ?`);
    renderSuggestions('default');
    setTimeout(() => document.getElementById('lrcInput').focus(), 300);
  } catch {
    document.getElementById('lrcName').textContent = 'Assistant LocalReply';
    document.getElementById('lrcAvatar').textContent = '💬';
    document.getElementById('lrcLoading').style.display = 'none';
    document.getElementById('lrcMessages').style.display = 'flex';
    document.getElementById('lrcSuggestions').style.display = 'flex';
    document.getElementById('lrcInputArea').style.display = 'flex';
    document.getElementById('lrcFooter').style.display = 'block';
    addMsg("Bonjour ! 👋 Je suis votre assistant IA LocalReply. Comment puis-je vous aider ?");
    renderSuggestions('default');
  }
}

lrcInit();
</script>
