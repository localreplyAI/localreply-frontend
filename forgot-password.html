<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié — LocalReply</title>
  <meta name="description" content="LocalReply — Assistant IA 24/7 pour petits commerces">
  <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A1628; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; min-height: 100vh; }
  </style>


<!-- Fix forgot-password -->

<style>
/* Fix auth pages - card visible */
.lrfp-card, .lrrp-card, 
[class*="card"]:not([class*="dark"]) {
  background: rgba(10,22,40,0.95) !important;
  border: 1px solid rgba(255,255,255,0.1) !important;
}
</style>

</head>
<body>
<div style="display: flex; min-height: 100vh; align-items: center; justify-content: center; background: linear-gradient(135deg, #0A1628 0%, #0052CC 50%, #00D4FF 100%); padding: 20px; position: relative; overflow: hidden;">

  <div style="position: absolute; top: -100px; right: -100px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, transparent 70%); border-radius: 50%; animation: float 20s infinite ease-in-out; pointer-events: none;"></div>
  <div style="position: absolute; bottom: -150px; left: -150px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,82,204,0.15) 0%, transparent 70%); border-radius: 50%; animation: float 25s infinite ease-in-out reverse; pointer-events: none;"></div>

  <div style="background: rgba(10,22,40,0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 50px 40px; max-width: 480px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative; z-index: 1;">

    <!-- LOGO + TITRE -->
    <div style="text-align: center; margin-bottom: 40px;">
      <img src="/assets/logo.png" alt="LocalReply" style="width:60px;height:60px;background:transparent;" loading="lazy">
      <h1 id="fp-title" style="font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #FFFFFF 0%, #00D4FF 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 8px 0;">Mot de passe oublié</h1>
      <p id="fp-sub" style="font-size: 15px; color: rgba(255,255,255,0.6); margin: 0;">Entrez votre email pour recevoir un lien de réinitialisation</p>
    </div>

    <!-- MESSAGES -->
    <div id="errorMessage" style="background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 10px; padding: 12px 16px; color: #EF4444; font-size: 14px; margin-bottom: 20px; display: none;"></div>
    <div id="successMessage" style="background: rgba(16,185,129,0.2); border: 1px solid rgba(16,185,129,0.5); border-radius: 10px; padding: 16px; color: #10B981; font-size: 14px; margin-bottom: 20px; display: none; text-align: center; line-height: 1.6;"></div>

    <!-- FORMULAIRE -->
    <form id="forgotForm">
      <div style="margin-bottom: 25px;">
        <label id="fp-lbl-email" style="display: block; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7); margin-bottom: 8px;">Adresse email</label>
        <input type="email" id="forgotEmail" placeholder="votre@email.com" required
          style="width: 100%; padding: 16px 18px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; color: #FFFFFF; font-size: 16px; outline: none; transition: all 0.3s; box-sizing: border-box;">
      </div>

      <button type="submit" id="submitBtn"
        style="width: 100%; padding: 18px; background: linear-gradient(135deg, #0052CC, #00D4FF); border: none; border-radius: 12px; color: #FFFFFF; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; box-shadow: 0 8px 20px rgba(0,212,255,0.4); text-transform: uppercase; letter-spacing: 1px;">
        <span id="fp-btn">📧 Envoyer le lien</span>
      </button>
    </form>

    <!-- RETOUR -->
    <div style="text-align: center; margin-top: 30px;">
      <a href="/auth" style="font-size: 14px; color: rgba(255,255,255,0.5); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: color 0.3s;">
        <span id="fp-back">← Retour à la connexion</span>
      </a>
    </div>

  </div>
</div>

<style>
@keyframes float { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-30px) scale(1.05);} }
input:focus { border-color: rgba(0,212,255,0.6) !important; box-shadow: 0 0 0 3px rgba(0,212,255,0.15) !important; background: rgba(255,255,255,0.08) !important; }
button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,212,255,0.5) !important; }
a:hover { color: rgba(255,255,255,0.8) !important; }
input::placeholder { color: rgba(255,255,255,0.3); }
* { box-sizing: border-box; }
</style>

<script>
// Sync language from URL prefix (e.g. /de/auth) into localStorage before this page reads it.
(function(){ var m=location.pathname.match(/^\/(fr|en|de|it|es|pt|nl|pl)(\/|$)/); if(m){ try{localStorage.setItem("lr_lang",m[1]);}catch(e){} } })();
const FP_T = {
  fr:{title:'Mot de passe oublié',sub:'Entrez votre email pour recevoir un lien de réinitialisation',lbl_email:'Adresse email',btn:'📧 Envoyer le lien',btn_loading:'Envoi en cours...',back:'← Retour à la connexion',err_empty:'❌ Veuillez entrer votre adresse email',success_title:'Email envoyé !',success_body:'Si un compte existe avec cette adresse, vous recevrez un lien de réinitialisation dans quelques minutes.',success_spam:'Vérifiez aussi vos spams.',page_title:'Mot de passe oublié — LocalReply'},
  en:{title:'Forgot password',sub:'Enter your email to receive a reset link',lbl_email:'Email address',btn:'📧 Send reset link',btn_loading:'Sending...',back:'← Back to sign in',err_empty:'❌ Please enter your email address',success_title:'Email sent!',success_body:'If an account exists with this address, you will receive a reset link in a few minutes.',success_spam:'Also check your spam folder.',page_title:'Forgot password — LocalReply'},
  de:{title:'Passwort vergessen',sub:'Geben Sie Ihre E-Mail ein, um einen Zurücksetzungslink zu erhalten',lbl_email:'E-Mail-Adresse',btn:'📧 Link senden',btn_loading:'Senden...',back:'← Zurück zur Anmeldung',err_empty:'❌ Bitte geben Sie Ihre E-Mail-Adresse ein',success_title:'E-Mail gesendet!',success_body:'Wenn ein Konto mit dieser Adresse existiert, erhalten Sie in wenigen Minuten einen Zurücksetzungslink.',success_spam:'Prüfen Sie auch Ihren Spam-Ordner.',page_title:'Passwort vergessen — LocalReply'},
  it:{title:'Password dimenticata',sub:"Inserisci la tua email per ricevere un link di reimpostazione",lbl_email:'Indirizzo email',btn:'📧 Invia link',btn_loading:'Invio...',back:'← Torna al login',err_empty:'❌ Inserisci il tuo indirizzo email',success_title:'Email inviata!',success_body:'Se esiste un account con questo indirizzo, riceverai un link di reimpostazione in pochi minuti.',success_spam:'Controlla anche la cartella spam.',page_title:'Password dimenticata — LocalReply'},
  es:{title:'Olvidé mi contraseña',sub:'Ingresa tu email para recibir un enlace de restablecimiento',lbl_email:'Dirección de email',btn:'📧 Enviar enlace',btn_loading:'Enviando...',back:'← Volver al inicio de sesión',err_empty:'❌ Por favor ingresa tu dirección de email',success_title:'¡Email enviado!',success_body:'Si existe una cuenta con esta dirección, recibirás un enlace de restablecimiento en unos minutos.',success_spam:'Revisa también tu carpeta de spam.',page_title:'Olvidé mi contraseña — LocalReply'},
  pt:{title:'Esqueci a palavra-passe',sub:'Insira o seu email para receber um link de redefinição',lbl_email:'Endereço de email',btn:'📧 Enviar link',btn_loading:'A enviar...',back:'← Voltar ao login',err_empty:'❌ Insira o seu endereço de email',success_title:'Email enviado!',success_body:'Se existir uma conta com este endereço, receberá um link de redefinição em alguns minutos.',success_spam:'Verifique também a pasta de spam.',page_title:'Esqueci a palavra-passe — LocalReply'},
  nl:{title:'Wachtwoord vergeten',sub:'Voer uw e-mail in om een resetlink te ontvangen',lbl_email:'E-mailadres',btn:'📧 Link versturen',btn_loading:'Verzenden...',back:'← Terug naar inloggen',err_empty:'❌ Voer uw e-mailadres in',success_title:'E-mail verzonden!',success_body:'Als er een account bestaat met dit adres, ontvangt u binnen enkele minuten een resetlink.',success_spam:'Controleer ook uw spam-map.',page_title:'Wachtwoord vergeten — LocalReply'},
  pl:{title:'Zapomniałem hasła',sub:'Podaj swój email, aby otrzymać link do zresetowania hasła',lbl_email:'Adres email',btn:'📧 Wyślij link',btn_loading:'Wysyłanie...',back:'← Powrót do logowania',err_empty:'❌ Proszę podać adres email',success_title:'Email wysłany!',success_body:'Jeśli istnieje konto z tym adresem, otrzymasz link do zresetowania hasła w ciągu kilku minut.',success_spam:'Sprawdź też folder spam.',page_title:'Zapomniałem hasła — LocalReply'},
};
(function(){
  const lang = localStorage.getItem('lr_lang')||(navigator.language||'fr').substring(0,2).toLowerCase();
  const t = FP_T[FP_T.hasOwnProperty(lang)?lang:'fr'];
  window._fpt = t;
  document.title = t.page_title;
  document.documentElement.lang = lang;
  const ids = {
    'fp-title': t.title, 'fp-sub': t.sub,
    'fp-lbl-email': t.lbl_email, 'fp-btn': t.btn, 'fp-back': t.back,
  };
  Object.entries(ids).forEach(([id,txt])=>{ const el=document.getElementById(id); if(el) el.textContent=txt; });
  const inp = document.getElementById('forgotEmail'); if(inp) inp.placeholder='email@example.com';
})();

const API_BASE_URL = 'https://localreply-api.onrender.com';

function showError(msg) {
  const el = document.getElementById('errorMessage');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('successMessage').style.display = 'none';
}

function showSuccess(msg) {
  const el = document.getElementById('successMessage');
  el.innerHTML = msg; el.style.display = 'block';
  document.getElementById('errorMessage').style.display = 'none';
  document.getElementById('forgotForm').style.display = 'none';
}

document.getElementById('forgotForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('forgotEmail').value.trim();
  const btn = document.getElementById('submitBtn');

  if (!email) { showError((_fpt||FP_T.fr).err_empty); return; }

  btn.disabled = true;
  document.getElementById('fp-btn').textContent = (_fpt||FP_T.fr).btn_loading;

  try {
    await fetch(`${API_BASE_URL}/api/auth/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    // On affiche toujours le succès même si l'email n'existe pas (sécurité)
    const _t2=(_fpt||FP_T.fr);
    showSuccess(`
      <div style="font-size: 36px; margin-bottom: 12px;">📧</div>
      <strong style="font-size: 16px; color: #FFFFFF; display: block; margin-bottom: 8px;">${_t2.success_title}</strong>
      ${_t2.success_body.replace('cette adresse','<strong style="color:#10B981">${email}</strong>').replace('this address','<strong style="color:#10B981">${email}</strong>').replace('dieser Adresse','<strong style="color:#10B981">${email}</strong>').replace('questo indirizzo','<strong style="color:#10B981">${email}</strong>').replace('esta dirección','<strong style="color:#10B981">${email}</strong>').replace('este endereço','<strong style="color:#10B981">${email}</strong>').replace('dit adres','<strong style="color:#10B981">${email}</strong>').replace('tym adresem','<strong style="color:#10B981">${email}</strong>')}<br><br>
      <span style="font-size: 13px; color: rgba(255,255,255,0.5);">${_t2.success_spam}</span>
    `);
  } catch (err) {
    const _t2=(_fpt||FP_T.fr);
    showSuccess(`
      <div style="font-size: 36px; margin-bottom: 12px;">📧</div>
      <strong style="font-size: 16px; color: #FFFFFF; display: block; margin-bottom: 8px;">${_t2.success_title}</strong>
      ${_t2.success_body}
    `);
  }
});

// Pas de redirection ici — on peut réinitialiser son mot de passe même si connecté
</script>

</body>
</html>
