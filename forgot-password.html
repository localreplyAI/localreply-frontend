<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié — LocalReply</title>
  <meta name="description" content="LocalReply — Assistant IA 24/7 pour petits commerces">
  <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A1628; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; min-height: 100vh; }
  </style>
</head>
<body>
<div style="display: flex; min-height: 100vh; align-items: center; justify-content: center; background: linear-gradient(135deg, #0A1628 0%, #0052CC 50%, #00D4FF 100%); padding: 20px; position: relative; overflow: hidden;">

  <div style="position: absolute; top: -100px; right: -100px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, transparent 70%); border-radius: 50%; animation: float 20s infinite ease-in-out; pointer-events: none;"></div>
  <div style="position: absolute; bottom: -150px; left: -150px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,82,204,0.15) 0%, transparent 70%); border-radius: 50%; animation: float 25s infinite ease-in-out reverse; pointer-events: none;"></div>

  <div style="background: rgba(10,22,40,0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 50px 40px; max-width: 480px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative; z-index: 1;">

    <!-- LOGO + TITRE -->
    <div style="text-align: center; margin-bottom: 40px;">
      <img src="https://i.ibb.co/ymJCVJTD/logo-localreply-AI-v2-1.png" alt="LocalReply" style="width: 60px; height: 60px; border-radius: 16px; background: #FFFFFF; padding: 8px; margin-bottom: 15px;" loading="lazy">
      <h1 style="font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #FFFFFF 0%, #00D4FF 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 8px 0;">Mot de passe oublié</h1>
      <p style="font-size: 15px; color: rgba(255,255,255,0.6); margin: 0;">Entrez votre email pour recevoir un lien de réinitialisation</p>
    </div>

    <!-- MESSAGES -->
    <div id="errorMessage" style="background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 10px; padding: 12px 16px; color: #EF4444; font-size: 14px; margin-bottom: 20px; display: none;"></div>
    <div id="successMessage" style="background: rgba(16,185,129,0.2); border: 1px solid rgba(16,185,129,0.5); border-radius: 10px; padding: 16px; color: #10B981; font-size: 14px; margin-bottom: 20px; display: none; text-align: center; line-height: 1.6;"></div>

    <!-- FORMULAIRE -->
    <form id="forgotForm">
      <div style="margin-bottom: 25px;">
        <label style="display: block; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7); margin-bottom: 8px;">Adresse email</label>
        <input type="email" id="forgotEmail" placeholder="votre@email.com" required
          style="width: 100%; padding: 16px 18px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; color: #FFFFFF; font-size: 16px; outline: none; transition: all 0.3s; box-sizing: border-box;">
      </div>

      <button type="submit" id="submitBtn"
        style="width: 100%; padding: 18px; background: linear-gradient(135deg, #0052CC, #00D4FF); border: none; border-radius: 12px; color: #FFFFFF; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; box-shadow: 0 8px 20px rgba(0,212,255,0.4); text-transform: uppercase; letter-spacing: 1px;">
        📧 Envoyer le lien
      </button>
    </form>

    <!-- RETOUR -->
    <div style="text-align: center; margin-top: 30px;">
      <a href="/auth" style="font-size: 14px; color: rgba(255,255,255,0.5); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: color 0.3s;">
        ← Retour à la connexion
      </a>
    </div>

  </div>
</div>

<style>
@keyframes float { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-30px) scale(1.05);} }
input:focus { border-color: rgba(0,212,255,0.6) !important; box-shadow: 0 0 0 3px rgba(0,212,255,0.15) !important; background: rgba(255,255,255,0.08) !important; }
button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,212,255,0.5) !important; }
a:hover { color: rgba(255,255,255,0.8) !important; }
input::placeholder { color: rgba(255,255,255,0.3); }
* { box-sizing: border-box; }
</style>

<script>
const API_BASE_URL = 'https://localreply-api.onrender.com';

function showError(msg) {
  const el = document.getElementById('errorMessage');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('successMessage').style.display = 'none';
}

function showSuccess(msg) {
  const el = document.getElementById('successMessage');
  el.innerHTML = msg; el.style.display = 'block';
  document.getElementById('errorMessage').style.display = 'none';
  document.getElementById('forgotForm').style.display = 'none';
}

document.getElementById('forgotForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('forgotEmail').value.trim();
  const btn = document.getElementById('submitBtn');

  if (!email) { showError('❌ Veuillez entrer votre adresse email'); return; }

  btn.disabled = true;
  btn.textContent = 'Envoi en cours...';

  try {
    await fetch(`${API_BASE_URL}/api/auth/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    // On affiche toujours le succès même si l'email n'existe pas (sécurité)
    showSuccess(`
      <div style="font-size: 36px; margin-bottom: 12px;">📧</div>
      <strong style="font-size: 16px; color: #FFFFFF; display: block; margin-bottom: 8px;">Email envoyé !</strong>
      Si un compte existe avec l'adresse <strong style="color: #10B981;">${email}</strong>,
      vous recevrez un lien de réinitialisation dans quelques minutes.<br><br>
      <span style="font-size: 13px; color: rgba(255,255,255,0.5);">Vérifiez aussi vos spams.</span>
    `);

  } catch (err) {
    // Même en cas d'erreur réseau, on affiche le succès (sécurité)
    showSuccess(`
      <div style="font-size: 36px; margin-bottom: 12px;">📧</div>
      <strong style="font-size: 16px; color: #FFFFFF; display: block; margin-bottom: 8px;">Email envoyé !</strong>
      Si un compte existe avec l'adresse <strong style="color: #10B981;">${email}</strong>,
      vous recevrez un lien de réinitialisation dans quelques minutes.
    `);
  }
});

// Pas de redirection ici — on peut réinitialiser son mot de passe même si connecté
</script>

</body>
</html>
