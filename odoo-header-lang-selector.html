var LR_FLAGS = { fr:'🇫🇷', en:'🇬🇧', de:'🇩🇪', it:'🇮🇹', es:'🇪🇸', pt:'🇵🇹' };

function lrT(key) {
  var lang = localStorage.getItem('lr_lang') || 'fr';
  return (LR_T[lang] && LR_T[lang][key]) || (LR_T['fr'] && LR_T['fr'][key]) || key;
}

function lrApply() {
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var key = el.getAttribute('data-i18n');
    var attr = el.getAttribute('data-i18n-attr');
    var val = lrT(key);
    if (attr) el.setAttribute(attr, val);
    else el.textContent = val;
  });
}

function lrSetLang(lang) {
  if (!LR_T[lang]) return;
  localStorage.setItem('lr_lang', lang);
  // Mettre à jour tous les sélecteurs sur la page
  document.querySelectorAll('#lrLangSelect, .lr-lang-selector').forEach(function(s) { s.value = lang; });
  // Mettre à jour tous les drapeaux
  document.querySelectorAll('#lrLangFlag, .lr-lang-flag').forEach(function(f) { f.textContent = LR_FLAGS[lang] || '🌐'; });
  // Appliquer les traductions
  lrApply();
}

// Init au chargement
document.addEventListener('DOMContentLoaded', function() {
  var saved = localStorage.getItem('lr_lang');
  // Auto-détection navigateur si première visite
  if (!saved) {
    var bl = (navigator.language || 'fr').slice(0,2);
    saved = LR_T[bl] ? bl : 'fr';
    localStorage.setItem('lr_lang', saved);
  }
  // Sync sélecteur + drapeau
  var sel = document.getElementById('lrLangSelect');
  if (sel) sel.value = saved;
  document.querySelectorAll('#lrLangFlag, .lr-lang-flag').forEach(function(f) { f.textContent = LR_FLAGS[saved] || '🌐'; });
  // Appliquer
  lrApply();
});
