  <meta name="description" content="LocalReply — Assistant IA 24/7 pour petits commerces">
  <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A1628; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; min-height: 100vh; }
  </style>
<script>
// Rediriger si déjà connecté
(function(){
  var t = localStorage.getItem('auth_token');
  var b = localStorage.getItem('business_id');
  if (t && b) { window.location.href = '/dashboard'; }
})();
</script>
<script>
// Afficher message si session expirée
(function(){
  if (new URLSearchParams(window.location.search).get('expired') === '1') {
    document.addEventListener('DOMContentLoaded', function() {
      const msg = document.createElement('div');
      msg.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.35);border-radius:10px;padding:12px 20px;color:#F59E0B;font-size:14px;font-weight:600;z-index:9999;';
      msg.textContent = (_t||AUTH_T.fr).session_expired;
      document.body.appendChild(msg);
      setTimeout(() => msg.remove(), 5000);
    });
  }
})();
</script>

    or:'lub', google:'Kontynuuj z Google',
    login_loading:'Logowanie...', signup_loading:'Tworzenie konta...',
    login_ok:'✅ Zalogowano! Przekierowanie...',
    signup_ok:'✅ Konto utworzone! Konfigurowanie...',
    pwd_mismatch:'❌ Hasła nie są zgodne',
    pwd_short:'❌ Hasło musi mieć co najmniej 8 znaków',
    verify_title:'Sprawdź swojego emaila ✉️',
    verify_sub:'Kliknij link w emailu, aby aktywować konto.',
    verify_spam:'💡 Sprawdź też folder spam.',
    resend:'🔄 Wyślij ponownie', resending:'Wysyłanie...', resent:'✅ Email wysłany!', resend_err:'❌ Błąd, spróbuj ponownie',

    login_403:'❌ Email nie zweryfikowany — sprawdź skrzynkę.',
    page_title:'Zaloguj się — LocalReply', verify_sent:'Link potwierdzający został wysłany do',
  },

(function() {
  const lang = localStorage.getItem('lr_lang') || (navigator.language || 'fr').substring(0,2).toLowerCase();
  const t = AUTH_T[AUTH_T.hasOwnProperty(lang) ? lang : 'fr'];
  window._t = t;
  document.title = t.page_title;

  function applyAuthLang() {
    // Tabs
    const tl = document.getElementById('tabLogin'); if (tl) tl.textContent = t.tab_login;
    const ts = document.getElementById('tabSignup'); if (ts) ts.textContent = t.tab_signup;
    // Labels
    const m = {'auth-subtitle':t.title,'lbl-login-email':t.lbl_email,'lbl-login-pwd':t.lbl_pwd,
      'forgot-pwd-link':t.forgot,'lbl-biz-name':t.lbl_biz,'lbl-signup-email':t.lbl_email,
      'lbl-signup-pwd':t.lbl_pwd,'lbl-confirm-pwd':t.lbl_confirm,'auth-terms':t.terms,
      'auth-terms-link':t.terms_link,'auth-or':t.or,'auth-google':t.google};
    Object.entries(m).forEach(([id,txt])=>{const el=document.getElementById(id);if(el)el.textContent=txt;});
    // Buttons (direct textContent on the button element)
    const lb = document.getElementById('loginBtn'); if (lb) lb.textContent = t.btn_login;
    const sb = document.getElementById('signupBtn'); if (sb) sb.textContent = t.btn_signup;
    // Placeholders
    const le = document.getElementById('loginEmail'); if (le) le.placeholder = 'email@example.com';
    const se = document.getElementById('signupEmail'); if (se) se.placeholder = 'email@example.com';
    const bn = document.getElementById('signupBusinessName');
    if (bn) bn.placeholder = lang === 'fr' ? 'Salon Marie' : 'My Business';
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', applyAuthLang);
  } else {
    applyAuthLang();
  }
})();

const API_BASE_URL = 'https://localreply-api.onrender.com';

// ─── Helper redirect ───
function redirectAfterAuth(data, isNewAccount = false) {
  const token = data.access_token || data.token;
  localStorage.setItem('auth_token', token);

  // Extraire business_id depuis la réponse OU depuis le JWT
  let businessId = data.business_id;
  if (!businessId || businessId === 'null') {
    // Fallback : lire depuis le JWT
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      businessId = payload.business_id || payload.sub || null;
    } catch {}
  }
  localStorage.setItem('business_id', businessId ? String(businessId) : 'null');

  // Si business_id est toujours null → dashboard quand même
  // Le backend doit corriger ça, pas bloquer l'utilisateur
  if (!businessId || businessId === 'null') {
    window.location.href = '/dashboard';
    return;
  }

  if (isNewAccount) {
    // Nouveau compte avec business_id valide → onboarding
    window.location.href = '/onboarding';
  } else {
    // Connexion → dashboard toujours (onboarding géré côté onboarding.html)
    // Ne pas se fier à onboarding_completed du backend qui peut être incorrect
    window.location.href = '/dashboard';
  }
}

// ─── Écran vérification email ───
function showVerifyEmailScreen(email) {
  const card = document.querySelector('[style*="background: rgba(10, 22, 40"]');
  if (!card) { showSuccess('✅ ' + (_t||AUTH_T.fr).verify_title.replace(' ✉️','') + ' — ' + email); return; }
  const _tv = (_t||AUTH_T.fr); card.innerHTML = `
    <div style="text-align:center;padding:20px 0;">
      <div style="font-size:56px;margin-bottom:20px;">📬</div>
      <h2 style="font-size:24px;font-weight:800;color:#fff;margin:0 0 12px;letter-spacing:-0.5px;">${_tv.verify_title}</h2>
      <p style="font-size:15px;color:rgba(255,255,255,0.55);line-height:1.7;margin:0 0 8px;">
        ${_tv.verify_sent||'A confirmation link was sent to'}
      </p>
      <div style="font-size:15px;font-weight:700;color:#00D4FF;margin-bottom:24px;">${email}</div>
      <p style="font-size:13px;color:rgba(255,255,255,0.4);line-height:1.6;margin:0 auto 28px;max-width:340px;">
        ${_tv.verify_sub}
      </p>
      <div style="padding:14px 20px;background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.15);border-radius:12px;font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:20px;">
        ${_tv.verify_spam}
      </div>
      <button onclick="resendVerification('${email}')" id="resendBtn" style="background:transparent;border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:rgba(255,255,255,0.5);padding:11px 20px;font-size:13px;cursor:pointer;font-family:inherit;transition:all 0.2s;" onmouseenter="this.style.borderColor='rgba(0,212,255,0.4)';this.style.color='#00D4FF'" onmouseleave="this.style.borderColor='rgba(255,255,255,0.15)';this.style.color='rgba(255,255,255,0.5)'">
        ${_tv.resend}
      </button>
    </div>`;
}

async function resendVerification(email) {
  const btn = document.getElementById('resendBtn');
  if (btn) { btn.disabled = true; btn.textContent = (_t||AUTH_T.fr).resending; }
  try {
    await fetch(`${API_BASE_URL}/api/auth/resend-verification`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    if (btn) { btn.textContent = (_t||AUTH_T.fr).resent; }
    setTimeout(() => { if (btn) { btn.disabled = false; btn.textContent = (_t||AUTH_T.fr).resend; } }, 5000);
  } catch {
    if (btn) { btn.disabled = false; btn.textContent = (_t||AUTH_T.fr).resend_err; }
  }
}

// ─── Init URL params (doit être en premier) ───
const urlParams = new URLSearchParams(window.location.search);

// ─── Vérification email depuis lien (/auth?token=xxx&mode=verify) ───
const verifyToken = urlParams.get('verify_token') || urlParams.get('token');
const verifyMode = urlParams.get('mode');

if (verifyToken && verifyMode === 'verify') {
  (async () => {
    try {
      const res = await fetch(`${API_BASE_URL}/api/auth/verify-email?token=${verifyToken}`);
      const data = await res.json();
      if (res.ok && (data.access_token || data.token)) {
        // Sauvegarder le token
        const tok = data.access_token || data.token;
        localStorage.setItem('auth_token', tok);
        let bid = data.business_id;
        if (!bid || bid === 'null') {
          try { bid = JSON.parse(atob(tok.split('.')[1])).business_id; } catch {}
        }
        if (bid) localStorage.setItem('business_id', String(bid));
        // Nouveau compte → choisir un abonnement d'abord
        window.location.href = '/choisir-plan?new=true';
      } else {
        showError('❌ ' + (data.detail || (_t||AUTH_T.fr).verify_invalid));
      }
    } catch {
      showError((_t||AUTH_T.fr).verify_err);
    }
  })();
}

// ─── Redirect Google OAuth (/auth?token=xxx&business_id=yyy) ───
const googleToken = urlParams.get('token');
const googleBusinessId = urlParams.get('business_id');
const googleNew = urlParams.get('new_account') === 'true';

if (googleToken && googleBusinessId && verifyMode !== 'verify') {
  // Vider l'ancien token avant de sauvegarder le nouveau
  localStorage.clear();
  localStorage.setItem('auth_token', googleToken);
  localStorage.setItem('business_id', String(googleBusinessId));
  // Sauvegarder aussi le slug si présent
  const googleSlug = urlParams.get('slug');
  if (googleSlug) localStorage.setItem('business_slug', googleSlug);
  
  if (googleNew) {
    // Nouveau compte Google → choisir abonnement d'abord
    window.location.href = '/choisir-plan?new=true';
  } else {
    // Compte existant → vérifier onboarding complété
    try {
      const payload = JSON.parse(atob(googleToken.split('.')[1]));
      const completed = payload.onboarding_completed ?? true;
      window.location.href = completed ? '/dashboard' : '/onboarding';
    } catch {
      window.location.href = '/dashboard';
    }
  }
  // STOP — ne pas exécuter la suite
  throw new Error('redirect');
}

// ─── Déjà connecté → dashboard ───
const existingToken = localStorage.getItem('auth_token');
if (existingToken) window.location.href = '/dashboard';

// ─── Switch tabs ───
function switchTab(tab) {
  const tabLogin = document.getElementById('tabLogin');
  const tabSignup = document.getElementById('tabSignup');
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');

  if (tab === 'login') {
    tabLogin.classList.add('active');
    tabLogin.style.cssText += 'background:linear-gradient(135deg,#0052CC,#00D4FF);color:#FFF;box-shadow:0 4px 12px rgba(0,212,255,0.4);';
    tabSignup.classList.remove('active');
    tabSignup.style.cssText += 'background:transparent;color:rgba(255,255,255,0.6);box-shadow:none;';
    loginForm.style.display = 'block';
    signupForm.style.display = 'none';
  } else {
    tabSignup.classList.add('active');
    tabSignup.style.cssText += 'background:linear-gradient(135deg,#0052CC,#00D4FF);color:#FFF;box-shadow:0 4px 12px rgba(0,212,255,0.4);';
    tabLogin.classList.remove('active');
    tabLogin.style.cssText += 'background:transparent;color:rgba(255,255,255,0.6);box-shadow:none;';
    loginForm.style.display = 'none';
    signupForm.style.display = 'block';
  }
  hideMessages();
}

function showError(msg) {
  const el = document.getElementById('errorMessage');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('successMessage').style.display = 'none';
}
function showSuccess(msg) {
  const el = document.getElementById('successMessage');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('errorMessage').style.display = 'none';
}
function hideMessages() {
  document.getElementById('errorMessage').style.display = 'none';
  document.getElementById('successMessage').style.display = 'none';
}

// ─── LOGIN ───
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideMessages();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = (_t||AUTH_T.fr).login_loading;

  try {
    const res = await fetch(`${API_BASE_URL}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) {
      // Cas spécial : email non vérifié
      if (res.status === 403 && data.detail?.includes('vérif')) {
        const emailVal = document.getElementById('loginEmail').value;
        showVerifyEmailScreen(emailVal);
        btn.disabled = false; btn.textContent = (_t||AUTH_T.fr).btn_login;
        return;
      }
      throw new Error(data.detail || ((_t||AUTH_T.fr).login_err || 'Login error'));
    }

    showSuccess((_t||AUTH_T.fr).login_ok);
    setTimeout(() => redirectAfterAuth(data, false), 1000);
  } catch (err) {
    showError('❌ ' + err.message);
    btn.disabled = false; btn.textContent = (_t||AUTH_T.fr).btn_login;
  }
});

// ─── INSCRIPTION ───
document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideMessages();
  const businessName = document.getElementById('signupBusinessName').value;
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;
  const passwordConfirm = document.getElementById('signupPasswordConfirm').value;
  const btn = document.getElementById('signupBtn');

  if (password !== passwordConfirm) { showError((_t||AUTH_T.fr).pwd_mismatch); return; }
  if (password.length < 8) { showError((_t||AUTH_T.fr).pwd_short); return; }

  btn.disabled = true; btn.textContent = (_t||AUTH_T.fr).signup_loading;

  try {
    const res = await fetch(`${API_BASE_URL}/api/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, business_name: businessName, lang: localStorage.getItem('lr_lang') || (navigator.language || 'fr').substring(0,2).toLowerCase() })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Erreur lors de la création du compte');

    // Si le backend retourne un token → inscription directe (Google ou sans vérif)
    if (data.access_token || data.token) {
      showSuccess((_t||AUTH_T.fr).signup_ok);
      setTimeout(() => redirectAfterAuth(data, true), 1500);
    } else {
      // Email de vérification envoyé → afficher l'écran d'attente
      showVerifyEmailScreen(data.email || email);
    }
  } catch (err) {
    showError('❌ ' + err.message);
    btn.disabled = false; btn.textContent = (_t||AUTH_T.fr).btn_signup;
  }
});

// ─── GOOGLE OAUTH ───
function loginWithGoogle() {
  window.location.href = `${API_BASE_URL}/api/auth/google/login`;
}
